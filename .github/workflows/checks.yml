name: "Code Analysis"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.head_ref) }}
  cancel-in-progress: true

permissions: read-all

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  Dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist/ is up to date
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date — run 'npm run build' and commit the result"
            exit 1
          fi

  Test:
    runs-on: ubuntu-latest
    outputs:
      roas-matrix: ${{ steps.roas.outputs.matrix }}
      nuspec-matrix: ${{ steps.nuspec-rs.outputs.matrix }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0

      - name: Checkout nuspec-rs as a test project
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
        with:
          repository: sv-tools/nuspec-rs
          path: ./nuspec-rs
      - id: nuspec-rs
        uses: ./
        with:
          manifest-path: "./nuspec-rs/Cargo.toml"
      - run: echo "Packages - ${{ steps.nuspec-rs.outputs.packages }}"
      - run: echo "To Publish - ${{ steps.nuspec-rs.outputs.publish }}"
      - run: echo "Matrix - ${{ steps.nuspec-rs.outputs.matrix }}"

      - name: Checkout roas as a test project
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
        with:
          repository: sv-tools/roas
          path: ./roas
      - id: roas
        uses: ./
        with:
          manifest-path: "./roas/Cargo.toml"
      - run: echo "Packages - ${{ steps.roas.outputs.packages }}"
      - run: echo "To Publish - ${{ steps.roas.outputs.publish }}"
      - run: echo "Matrix - ${{ steps.roas.outputs.matrix }}"

      - name: Should fail
        uses: ./
        continue-on-error: true

  ToolchainPin:
    # Regression test: project pins a specific toolchain in rust-toolchain.toml
    # that may differ from the runner's default. Action must succeed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
      - name: Create a Rust project with a pinned toolchain
        run: |
          mkdir -p ./pinned/src
          cat > ./pinned/Cargo.toml <<'EOF'
          [package]
          name = "pinned"
          version = "0.0.1"
          edition = "2021"
          EOF
          echo "fn main() {}" > ./pinned/src/main.rs
          cat > ./pinned/rust-toolchain.toml <<'EOF'
          [toolchain]
          channel = "1.85.0"
          profile = "minimal"
          EOF
      - id: pinned
        uses: ./
        with:
          manifest-path: "./pinned/Cargo.toml"
      - name: Verify outputs
        run: |
          echo "Packages: ${{ steps.pinned.outputs.packages }}"
          test '${{ steps.pinned.outputs.packages }}' = '["pinned"]'

  Roas:
    runs-on: ubuntu-latest
    needs: Test
    strategy:
      matrix:
        args: ${{ fromJson(needs.Test.outputs.roas-matrix) }}
    steps:
      - name: Checkout roas as a test project
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
        with:
          repository: sv-tools/roas
      - name: Run tests
        run: cargo test ${{ matrix.args }} --no-default-features --no-fail-fast --verbose

  Nuspec:
    runs-on: ubuntu-latest
    needs: Test
    strategy:
      matrix:
        args: ${{ fromJson(needs.Test.outputs.nuspec-matrix) }}
    steps:
      - name: Checkout nuspec-rs as a test project
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5.5.0
        with:
          repository: sv-tools/nuspec-rs
      - name: Run tests
        run: cargo test ${{ matrix.args }} --no-default-features --no-fail-fast --verbose
